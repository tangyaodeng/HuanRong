        timestamp_field: "UpdateDateTime"
        weight: 1.0

      - feature_name: "3号主机冷却侧冷量"
        table_name: "hrdz_zlz_ai756"
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
        weight: 1.0
    sync:
      enabled: true
      interval_seconds: 300
      batch_size: 1000
      process_realtime: true
      historical_fill_enabled: true
      historical_start_date: "2025-01-01"
    calculation_params:
      precision: 4
      allow_zero_denominator: false
      zero_denominator_value: null
      min_value: 0
      max_value: 100

  # 系统散热量2计算（直接由4/5号主机冷却侧冷量相加）
  - name: "系统散热量2"
    description: "系统散热量2 = 4号主机冷却侧冷量+5号主机冷却侧冷量"
