# 复合特征计算配置
database:
  # 数据库连接配置
  host: "192.168.5.43"            # 数据库主机地址
  port: 3306                   # 数据库端口
  username: "admin1"             # 用户名
  password: "123456"         # 密码
  database_name: "xm_hisdata"  # 数据库名
  charset: "utf8mb4"          # 字符集

composite_features:
  # 主机总功率1计算
  - name: "主机总功率1"                     # 复合特征名称
    description: "主机总功率1 = 1#主机功率+2#主机功率+3#主机功率"  # 描述
    output_table: "composite_total_host_meter_1"  # 计算结果存储表名
    calculation_method: "add"    # 计算方法：add
    input_features: # 输入特征配置
      - feature_name: "1#主机功率"
        table_name: "hrdz_zlz_ai354"  #
        field_name: "PointValue"   # 数值字段名
        timestamp_field: "UpdateDateTime"  # 时间戳字段名
        weight: 1.0                # 权重（可选）
#        is_numerator: true         # 是否是分子（用于除法）

      - feature_name: "2#主机功率"
        table_name: "hrdz_zlz_ai362"
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
        weight: 1.0

      - feature_name: "3#主机功率"
        table_name: "hrdz_zlz_ai370"
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
        weight: 1.0
    # 数据同步设置
    sync:
      enabled: true                    # 是否启用同步
      interval_seconds: 300            # 同步间隔（秒），5分钟
      batch_size: 1000                 # 每次同步处理的最大记录数
      process_realtime: true           # 是否处理实时数据
      historical_fill_enabled: true    # 启用历史数据补全
      historical_start_date: "2025-01-01"  # 历史开始日期
      # historical_end_date: "2026-12-31" # 可选：历史结束日期（不填则到当前时间）

    # 计算参数
    calculation_params:
      precision: 4                     # 结果精度（小数位数）
      allow_zero_denominator: false    # 是否允许分母为零
      zero_denominator_value: null     # 分母为零时的默认值
      min_value: 0                     # 最小值限制
      max_value: 999999                   # 最大值限制

  # 主机总功率2计算
  - name: "主机总功率2"                     # 复合特征名称
    description: "主机总功率2 = 4#主机功率+5#主机功率"  # 描述
    output_table: "composite_total_host_meter_2"  # 计算结果存储表名
    calculation_method: "add"    # 计算方法：add
    input_features: # 输入特征配置
      - feature_name: "4#主机功率"
        table_name: "hrdz_zlz_ai378"  #
        field_name: "PointValue"   # 数值字段名
        timestamp_field: "UpdateDateTime"  # 时间戳字段名
        weight: 1.0                # 权重（可选）
      #        is_numerator: true         # 是否是分子（用于除法）

      - feature_name: "5#主机功率"
        table_name: "hrdz_zlz_ai386"
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
        weight: 1.0

    # 数据同步设置
    sync:
      enabled: true                    # 是否启用同步
      interval_seconds: 300            # 同步间隔（秒），5分钟
      batch_size: 1000                 # 每次同步处理的最大记录数
      process_realtime: true           # 是否处理实时数据
      historical_fill_enabled: true    # 启用历史数据补全
      historical_start_date: "2025-01-01"  # 历史开始日期
      # historical_end_date: "2026-12-31" # 可选：历史结束日期（不填则到当前时间）

    # 计算参数
    calculation_params:
      precision: 4                     # 结果精度（小数位数）
      allow_zero_denominator: false    # 是否允许分母为零
      zero_denominator_value: null     # 分母为零时的默认值
      min_value: 0                     # 最小值限制
      max_value: 999999                   # 最大值限制
  # 系统散热量1计算（直接由1/2/3号主机冷却侧冷量相加）
  - name: "系统散热量1"
    description: "系统散热量1 = 1号主机冷却侧冷量+2号主机冷却侧冷量+3号主机冷却侧冷量"
    output_table: "composite_system_heat_dissipation_1"
    calculation_method: "add"
    input_features:
