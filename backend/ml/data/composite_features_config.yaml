    calculation_method: "add"
    input_features:
      - feature_name: "冷却塔1号配电柜电表实时功率"
        table_name: "hrdz_zlz_ai704"
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
        weight: 1.0
      - feature_name: "冷却塔2号配电柜电表实时功率"
        table_name: "hrdz_zlz_ai712"
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
        weight: 1.0
      - feature_name: "冷却塔3号配电柜电表实时功率"
