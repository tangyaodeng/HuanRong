    calculation_method: "add"
    input_features:
      - feature_name: "1#冷冻泵功率"
        table_name: "hrdz_zlz_ai394"
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
        weight: 1.0
      - feature_name: "2#冷冻泵功率"
        table_name: "hrdz_zlz_ai402"
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
        weight: 1.0
      - feature_name: "3#冷冻泵功率"
        table_name: "hrdz_zlz_ai410"
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
        weight: 1.0
      - feature_name: "4#冷冻泵功率"
        table_name: "hrdz_zlz_ai418"
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
        weight: 1.0
    sync:
      enabled: true
      interval_seconds: 300
      batch_size: 1000
      process_realtime: true
      historical_fill_enabled: true
      historical_start_date: "2025-01-01"
    calculation_params:
      precision: 4
      min_value: 0
      max_value: 999999

  # 冷冻泵总功率2（5-7号泵）
  - name: "冷冻泵总功率2"
    description: "冷冻泵总功率2 = 5#冷冻泵+6#冷冻泵+7#冷冻泵"
    output_table: "composite_total_chilled_pump_meter_2"
    calculation_method: "add"
    input_features:
      - feature_name: "5#冷冻泵功率"
        table_name: "hrdz_zlz_ai426"
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
        weight: 1.0
      - feature_name: "6#冷冻泵功率"
        table_name: "hrdz_zlz_ai434"
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
        weight: 1.0
      - feature_name: "7#冷冻泵功率"
        table_name: "hrdz_zlz_ai442"
