        timestamp_field: "UpdateDateTime"
        weight: 1.0
      - feature_name: "3#冷却泵功率"
        table_name: "hrdz_zlz_ai490"
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
        weight: 1.0
      - feature_name: "4#冷却泵功率"
        table_name: "hrdz_zlz_ai498"
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
        weight: 1.0
    sync:
      enabled: true
