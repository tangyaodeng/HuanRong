  # 总每小时用冷量（基载总管 + 板换二次总管）
  - name: "总每小时用冷量"
    description: "总每小时用冷量 = 基载冷冻侧总管每小时冷量 + 1号板每小时冷量 + 2号板每小时冷量"
    output_table: "composite_hourly_cooling_energy_total"
    calculation_method: "add"
    input_features:
      - feature_name: "基载冷冻侧总管每小时冷量"
        table_name: "composite_hourly_cooling_energy_base"   # 引用上一步输出表
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
        weight: 1.0
      - feature_name: "1号板每小时冷量"
        table_name: "composite_hourly_cooling_energy_plate_1"   # 引用上一步输出表
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
        weight: 1.0
      - feature_name: "2号板每小时冷量"
        table_name: "composite_hourly_cooling_energy_plate_2"   # 引用上一步输出表
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
        weight: 1.0
    calculation_params:
      precision: 2
      min_value: 0
      max_value: 100000       # 适当加大，因为是两个合计
    sync:
      enabled: true
      interval_seconds: 3600
      batch_size: 1000
      process_realtime: true
      historical_fill_enabled: true
      historical_start_date: "2025-01-01"# 每小时用冷量（基于累计冷量差分）

  # ---------- 基于小时数据的聚合 ----------
  # 日负荷冷量总量
  - name: "日负荷冷量总量"
    description: "由总每小时用冷量按天求和得到"
    output_table: "composite_daily_cooling_energy_total"
    calculation_method: "time_aggregation"
    input_features:
      - feature_name: "总每小时用冷量"
        table_name: "composite_hourly_cooling_energy_total"   # 你的小时表
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
    calculation_params:
      resample_rule: "1D"         # 天聚合
      aggregation_func: "sum"
      precision: 2
      min_value: 0
      max_value: 1000000
    sync:
      enabled: true
      interval_seconds: 3600
      batch_size: 1000
      process_realtime: true
      historical_fill_enabled: true
      historical_start_date: "2025-01-01"

  # 周负荷冷量总量（自然周，周一为起始）
  - name: "周负荷冷量总量"
    description: "由总每小时用冷量按周求和得到（周一 ~ 周日）"
    output_table: "composite_weekly_cooling_energy_total"
    calculation_method: "time_aggregation"
    input_features:
      - feature_name: "总每小时用冷量"
        table_name: "composite_hourly_cooling_energy_total"
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
    calculation_params:
      resample_rule: "1W-MON"     # 周聚合，以周一为每周第一天
      aggregation_func: "sum"
      precision: 2
      min_value: 0
      max_value: 10000000
    sync:
      enabled: true
      interval_seconds: 3600
      batch_size: 1000
      process_realtime: true
      historical_fill_enabled: true
      historical_start_date: "2025-01-01"

  # 月负荷冷量总量（自然月）
  - name: "月负荷冷量总量"
    description: "由总每小时用冷量按月求和得到"
    output_table: "composite_monthly_cooling_energy_total"
    calculation_method: "time_aggregation"
    input_features:
      - feature_name: "总每小时用冷量"
        table_name: "composite_hourly_cooling_energy_total"
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
    calculation_params:
      resample_rule: "1M"         # 月聚合
      aggregation_func: "sum"
      precision: 2
      min_value: 0
      max_value: 50000000
    sync:
      enabled: true
      interval_seconds: 3600
      batch_size: 1000
      process_realtime: true
      historical_fill_enabled: true
      historical_start_date: "2025-01-01"


# 全局同步设置
global_sync:
  enabled: true
  check_interval_seconds: 60  # 检查间隔（秒）
  max_concurrent_tasks: 5     # 最大并发任务数
  retry_count: 3              # 失败重试次数
  retry_delay_seconds: 10     # 重试延迟

# 日志配置
logging:
  level: "INFO"               # 日志级别：DEBUG, INFO, WARNING, ERROR
  file_path: "composite_feature.log"  # 日志文件路径
  max_size_mb: 10             # 日志文件最大大小（MB）
