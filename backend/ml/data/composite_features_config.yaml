    description: "通过基载冷冻侧总管累计冷量整点差值计算每小时的冷量消耗"
    output_table: "composite_hourly_cooling_energy_base"
    calculation_method: "cumulative_diff"
    input_features:
      - feature_name: "累计冷量"
        table_name: "hrdz_zlz_ai761"
        field_name: "PointValue"
        timestamp_field: "UpdateDateTime"
    calculation_params:
      resample_rule: "1H"
      diff_periods: 1
      fill_method: "ffill"
      nearest_window_minutes: 5
      precision: 2
      min_value: 0
      max_value: 50000
    sync:
      enabled: true
      interval_seconds: 3600
      batch_size: 1000
      process_realtime: true
      historical_fill_enabled: true
      historical_start_date: "2025-01-01"

  # 1号板换冷量每小时冷量
  - name: "1号板换冷量"
