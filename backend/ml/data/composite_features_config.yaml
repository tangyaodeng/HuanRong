      historical_start_date: "2025-01-01"
    calculation_params:
      precision: 4
      min_value: 0
      max_value: 999999

  # 乙二醇泵总功率（3个泵）
  - name: "乙二醇泵总功率"
    description: "乙二醇泵总功率 = 1#乙二醇泵+2#乙二醇泵+3#乙二醇泵"
    output_table: "composite_total_glycol_pump_meter"
    calculation_method: "add"
    input_features:
      - feature_name: "1#乙二醇泵功率"
        table_name: "hrdz_zlz_ai450"
        field_name: "PointValue"
