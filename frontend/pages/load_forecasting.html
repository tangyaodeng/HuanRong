<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>负荷预测 - 智慧暖通AI预测系统</title>

    <link rel="stylesheet" href="/frontend/css/style.css">
    <link rel="stylesheet" href="/frontend/css/dashboard.css">
    <link rel="stylesheet" href="/frontend/css/components.css">
    <link rel="stylesheet" href="/frontend/css/all.min.css">
    <script src="/frontend/js/echarts.min.js"></script>
    <style>
        #global-loading {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999;
}
        .monitoring-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(500px, 800px));
            gap: 20px;
            margin-top: 20px;
            justify-content: center;
            align-items: start;
        }

        .chart-container {
            background: white;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #e9ecef;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            height: 450px;
            width: 100%;
            max-width: 800px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chart-wrapper {
            flex: 1;
            width: 100%;
            min-height: 250px;
        }

        @media (max-width: 1700px) {
            .monitoring-grid {
                grid-template-columns: repeat(2, minmax(450px, 1fr));
            }
        }

        @media (max-width: 1200px) {
            .monitoring-grid {
                grid-template-columns: minmax(300px, 800px);
                justify-items: center;
            }
            .chart-container {
                width: 100%;
                max-width: 800px;
            }
        }

        @media (max-width: 768px) {
            .chart-container {
                height: 400px;
                padding: 15px;
            }
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e9ecef;
            flex-shrink: 0;
        }

        .chart-title {
            font-weight: 600;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1em;
        }

        .page-stats {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 15px;
            background: white;
            border-radius: 4px;
            border: 1px solid #e9ecef;
        }

        .stat-label {
            font-weight: 500;
            color: #6c757d;
        }

        .stat-value {
            font-weight: 600;
            color: #495057;
        }

        /* 全天用冷规划按钮 */
        .daily-plan-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            transition: background 0.2s;
            margin-left: 12px;
        }
        .daily-plan-btn:hover {
            background: #2980b9;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 900px;
            width: 95%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .modal-header {
            padding: 20px 20px 10px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 {
            margin: 0;
            font-size: 1.25rem;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #6c757d;
            transition: color 0.2s;
        }
        .modal-close:hover {
            color: #dc3545;
        }
        .modal-body {
            padding: 20px;
        }

        /* 用冷规划表格 */
        .plan-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        .plan-table thead th {
            background: #f8f9fa;
            padding: 10px 8px;
            text-align: center;
            font-weight: 600;
            color: #495057;
            border-bottom: 2px solid #dee2e6;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }
        .plan-table tbody td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #e9ecef;
        }
        .plan-table tbody tr:hover {
            background: #f8f9fa;
        }
        .plan-table .weather-icon {
            font-size: 1.2em;
        }
        .plan-table .load-high {
            color: #e74c3c;
            font-weight: 600;
        }
        .plan-table .load-mid {
            color: #f39c12;
            font-weight: 600;
        }
        .plan-table .load-low {
            color: #27ae60;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <main class="main-content">
        <div class="page-header">
            <h1><i class="fas fa-chart-bar"></i> 负荷预测</h1>
            <div class="page-actions">
                <button class="daily-plan-btn" id="daily-plan-btn">
                    <i class="fas fa-calendar-alt"></i> 全天用冷规划
                </button>
            </div>
        </div>

        <div class="page-stats">
            <div class="stat-item">
                <span class="stat-label">预测基准日期:</span>
                <span class="stat-value" id="base-date">2026-05-20</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">今日预计总冷量:</span>
                <span class="stat-value" id="today-total-load">12,580 kW</span>
            </div>
        </div>

        <div class="monitoring-grid" id="monitoring-grid">
            <!-- 图表1: 未来三天每时 -->
            <div class="chart-container" id="chart-container-1">
                <div class="chart-header">
                    <h3 class="chart-title">
                        <i class="fas fa-clock"></i>
                        未来三天逐时负荷预测
                    </h3>
                </div>
                <div class="chart-wrapper" id="chart-1"></div>
            </div>

            <!-- 图表2: 未来每周逐日 -->
            <div class="chart-container" id="chart-container-2">
                <div class="chart-header">
                    <h3 class="chart-title">
                        <i class="fas fa-calendar-week"></i>
                        未来一周逐日负荷预测
                    </h3>
                </div>
                <div class="chart-wrapper" id="chart-2"></div>
            </div>

            <!-- 图表3: 未来一月逐周 -->
            <div class="chart-container" id="chart-container-3">
                <div class="chart-header">
                    <h3 class="chart-title">
                        <i class="fas fa-calendar-alt"></i>
                        未来一月逐周负荷预测
                    </h3>
                </div>
                <div class="chart-wrapper" id="chart-3"></div>
            </div>

            <!-- 图表4: 未来一年逐月 -->
            <div class="chart-container" id="chart-container-4">
                <div class="chart-header">
                    <h3 class="chart-title">
                        <i class="fas fa-calendar"></i>
                        未来一年逐月负荷预测
                    </h3>
                </div>
                <div class="chart-wrapper" id="chart-4"></div>
            </div>
        </div>

        <!-- 全天用冷规划弹窗 -->
        <div class="modal" id="daily-plan-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-calendar-alt"></i> 全天用冷规划 - 2026年5月20日</h2>
                    <button class="modal-close" id="modal-close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <table class="plan-table" id="plan-table">
                        <thead>
                            <tr>
                                <th>小时</th>
                                <th>温度(℃)</th>
                                <th>湿度(%)</th>
                                <th>天气</th>
                                <th>风向</th>
                                <th>预计用冷(kW)</th>
                            </tr>
                        </thead>
                        <tbody id="plan-table-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="/frontend/js/utils.js"></script>
        <script src="/frontend/js/pages/load_forecasting-api.js"></script>
    <script src="/frontend/js/pages/load_forecasting.js"></script>
    <script src="/frontend/js/components/navbar.js"></script>
</body>
</html>
