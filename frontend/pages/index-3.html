<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧暖通管理平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', system-ui, -apple-system, sans-serif;
            background: #0a1628;
        }

        /* ===== 背景层 ===== */
        .bg-layer {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 70% 60% at 50% 40%, rgba(8, 68, 160, 0.35) 0%, transparent 70%),
                radial-gradient(ellipse 40% 50% at 20% 80%, rgba(0, 120, 210, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse 40% 50% at 80% 20%, rgba(0, 160, 240, 0.12) 0%, transparent 60%),
                linear-gradient(180deg, #0a1628 0%, #0d1f3c 30%, #0f2447 60%, #0a1628 100%);
        }
        .bg-layer::before {
            content: '';
            position: absolute; top: -30%; left: 50%; transform: translateX(-50%);
            width: 1200px; height: 800px;
            background: radial-gradient(ellipse, rgba(0, 140, 255, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }
        #bgCanvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        /* ===== 顶部导航栏 ===== */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 20;
            height: 56px;
            padding: 0 40px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(10, 22, 40, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 140, 255, 0.1);
        }
        .nav-logo {
            display: flex; align-items: center; gap: 10px;
            font-size: 16px; font-weight: 600; color: #d0e4f5; letter-spacing: 1px;
        }
        .nav-logo svg { width: 28px; height: 28px; }
        .nav-right {
            display: flex; align-items: center; gap: 20px;
            font-size: 12px; color: rgba(140, 180, 220, 0.5);
        }
        .nav-right span { cursor: pointer; transition: color 0.2s; letter-spacing: 1px; }
        .nav-right span:hover { color: rgba(0, 180, 255, 0.8); }

        /* ===== 主容器 ===== */
        .page-wrapper {
            position: relative; z-index: 10;
            width: 100%; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        /* ===== 左侧品牌区 ===== */
        .brand-area {
            position: absolute; left: 8%; top: 44%;
            color: #fff; max-width: 460px; transform: translateY(-50%);
        }
        .brand-tagline {
            font-size: 12px; letter-spacing: 8px;
            color: rgba(0, 180, 255, 0.6); text-transform: uppercase;
            margin-bottom: 16px; font-weight: 300;
        }
        .brand-title {
            font-size: 48px; font-weight: 700; line-height: 1.25; margin-bottom: 14px;
            background: linear-gradient(135deg, #e0f0ff 0%, #6cb4ee 50%, #a0d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-subtitle {
            font-size: 15px; color: rgba(200, 220, 240, 0.5);
            line-height: 1.6; font-weight: 300; margin-bottom: 32px;
        }
        .brand-line {
            width: 50px; height: 2px;
            background: linear-gradient(90deg, #0088ff, transparent);
            margin-bottom: 20px;
        }

        /* ===== 底部特性卡片 ===== */
        .feature-cards {
            position: absolute; bottom: 8%; left: 8%;
            display: flex; gap: 16px; z-index: 11;
        }
        .feature-card {
            width: 140px; padding: 18px 14px;
            background: rgba(10, 25, 50, 0.55);
            border: 1px solid rgba(0, 120, 200, 0.12);
            border-radius: 10px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            text-align: center;
            transition: all 0.35s ease;
            cursor: default;
        }
        .feature-card:hover {
            border-color: rgba(0, 160, 255, 0.35);
            background: rgba(10, 30, 60, 0.7);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 80, 180, 0.15);
        }
        .feature-icon {
            font-size: 28px; margin-bottom: 10px;
            color: rgba(0, 180, 255, 0.7);
            transition: color 0.35s ease, transform 0.35s ease;
        }
        .feature-card:hover .feature-icon {
            color: rgba(100, 210, 255, 0.9);
            transform: scale(1.1);
        }
        .feature-title {
            font-size: 13px; font-weight: 500; color: #c0d8ef; margin-bottom: 4px;
        }
        .feature-desc {
            font-size: 11px; color: rgba(140, 180, 220, 0.4); line-height: 1.4;
        }

        /* ===== 左侧状态条 ===== */
        .status-panel {
            display: flex; gap: 12px;
            margin-top: 28px;
            flex-wrap: wrap;
        }
        .status-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 14px;
            background: rgba(10, 25, 50, 0.3);
            border: 1px solid rgba(0, 120, 200, 0.08);
            border-radius: 6px;
            font-size: 12px; color: rgba(160, 200, 230, 0.6);
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .status-item:hover {
            border-color: rgba(0, 140, 255, 0.25);
            background: rgba(10, 30, 60, 0.45);
            color: rgba(180, 220, 245, 0.8);
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }
        .status-dot.green { background: #2ecc71; box-shadow: 0 0 8px rgba(46,204,113,0.5); }
        .status-dot.blue  { background: #3498db; box-shadow: 0 0 8px rgba(52,152,219,0.5); }
        .status-dot.cyan  { background: #00bcd4; box-shadow: 0 0 8px rgba(0,188,212,0.5); }

        /* ===== 登录卡片 ===== */
        .login-card {
            position: absolute; right: 8%; top: 56%;
            transform: translateY(-50%);
            width: 380px; padding: 40px 36px 36px;
            background: rgba(10, 25, 50, 0.7);
            border: 1px solid rgba(0, 140, 255, 0.15);
            border-radius: 12px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow:
                0 0 50px rgba(0, 100, 200, 0.06),
                0 16px 48px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
            z-index: 11;
        }
        .login-card:hover {
            border-color: rgba(0, 150, 255, 0.3);
            box-shadow:
                0 0 60px rgba(0, 100, 200, 0.1),
                0 16px 48px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }
        .login-card::before {
            content: '';
            position: absolute; top: 0; left: 36px; right: 36px; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 150, 255, 0.3), transparent);
        }

        .login-header { text-align: center; margin-bottom: 30px; }
        .login-icon {
            width: 52px; height: 52px; margin: 0 auto 14px;
            background: linear-gradient(135deg, rgba(0, 120, 210, 0.2), rgba(0, 180, 255, 0.08));
            border: 1px solid rgba(0, 150, 255, 0.25);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .login-icon svg { width: 26px; height: 26px; }
        .login-title { font-size: 18px; font-weight: 600; color: #d0e4f5; letter-spacing: 2px; }
        .login-desc { font-size: 11px; color: rgba(140, 180, 220, 0.45); margin-top: 4px; letter-spacing: 1px; }

        /* ===== 表单 ===== */
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label {
            display: block; font-size: 11px; color: rgba(140, 180, 220, 0.55);
            margin-bottom: 6px; letter-spacing: 1px; font-weight: 400;
        }
        .input-wrapper { position: relative; }
        .input-wrapper .input-icon {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: rgba(0, 160, 255, 0.35); font-size: 15px;
            transition: color 0.3s ease; pointer-events: none;
        }
        .form-input {
            width: 100%; padding: 12px 12px 12px 40px;
            background: rgba(0, 30, 60, 0.45);
            border: 1px solid rgba(0, 120, 200, 0.18);
            border-radius: 8px;
            color: #d0e4f5; font-size: 14px; font-family: inherit;
            outline: none; transition: all 0.3s ease; letter-spacing: 0.5px;
        }
        .form-input::placeholder { color: rgba(120, 160, 200, 0.3); font-size: 13px; }
        .form-input:focus {
            border-color: rgba(0, 150, 255, 0.5);
            background: rgba(0, 40, 80, 0.5);
            box-shadow: 0 0 16px rgba(0, 120, 255, 0.06), inset 0 0 16px rgba(0, 100, 200, 0.03);
        }
        .input-wrapper:focus-within .input-icon { color: rgba(0, 180, 255, 0.6); }
        .form-input.error {
            border-color: rgba(255, 80, 80, 0.45);
            box-shadow: 0 0 12px rgba(255, 50, 50, 0.06);
        }
        .form-error {
            font-size: 11px; color: rgba(255, 100, 100, 0.75);
            margin-top: 5px; min-height: 14px; letter-spacing: 0.5px;
        }

        /* ===== 登录按钮 ===== */
        .login-btn {
            width: 100%; padding: 13px; margin-top: 8px;
            background: linear-gradient(135deg, #0055aa 0%, #0077cc 50%, #0055aa 100%);
            border: 1px solid rgba(0, 150, 255, 0.35); border-radius: 8px;
            color: #e0f0ff; font-size: 15px; font-weight: 500; font-family: inherit;
            cursor: pointer; letter-spacing: 4px;
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .login-btn:hover {
            background: linear-gradient(135deg, #0066bb 0%, #0088dd 50%, #0066bb 100%);
            border-color: rgba(0, 180, 255, 0.55);
            box-shadow: 0 0 24px rgba(0, 120, 255, 0.2), 0 6px 20px rgba(0, 80, 160, 0.25);
            transform: translateY(-1px);
        }
        .login-btn:active { transform: translateY(0); transition: all 0.1s ease; }
        .login-btn::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .login-btn:hover::after { opacity: 1; }
        .login-btn.loading { pointer-events: none; color: transparent; }
        .login-btn.loading::before {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        .login-footer { text-align: center; margin-top: 20px; font-size: 11px; color: rgba(120, 160, 200, 0.3); letter-spacing: 1px; }

        /* ===== 响应式 ===== */
        @media (max-width: 1200px) {
            .brand-area { display: none; }
            .feature-cards { display: none; }
            .login-card { right: 50%; transform: translate(50%, -50%); top: 50%; }
        }
        @media (max-width: 500px) {
            .login-card { width: 90vw; padding: 32px 24px 28px; }
            .top-nav { padding: 0 20px; }
        }
    </style>
</head>

    <!-- ===== Canvas 鼠标联动粒子（柔和版） ===== -->
    <script>
        (function() {
            var cvs = document.getElementById('bgCanvas');
            var ctx = cvs.getContext('2d');
            var w, h, pts = [];
            var mouse = { x: -9999, y: -9999, tx: -9999, ty: -9999 };
            var MAX = 100;
            var CONNECT_DIST = 130;
            var MOUSE_RANGE = 150;

            function rs() { w = cvs.width = innerWidth; h = cvs.height = innerHeight; }
            function rn(a,b) { return Math.random() * (b - a) + a; }

            function mk() {
                return {
                    x: rn(0,w), y: rn(0,h),
                    vx: rn(-0.15, 0.15),
                    vy: rn(-0.15, 0.15),
                    r: rn(1.2, 2.8),
                    ba: rn(0.2, 0.45),
                    ph: rn(0, Math.PI * 2)
                };
            }

            function init() { pts = []; for (var i = 0; i < MAX; i++) pts.push(mk()); }

            document.addEventListener('mousemove', function(e) { mouse.tx = e.clientX; mouse.ty = e.clientY; });
            document.addEventListener('mouseleave', function() { mouse.tx = -9999; mouse.ty = -9999; });

            function drawP(p) {
                var dx = p.x - mouse.x, dy = p.y - mouse.y;
                var md = Math.sqrt(dx*dx + dy*dy);
                var mf = md < MOUSE_RANGE ? Math.pow(1 - md/MOUSE_RANGE, 1.5) : 0;

                // 柔和放大：最多 1.5 倍
                var r = p.r * (1 + mf * 1.5);
                var alpha = Math.min(0.85, p.ba + mf * 0.2);

                // 外发光（缩小）
                var gr = r * 3.5 * (1 + mf * 1.2);
                var g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, gr);
                g.addColorStop(0, 'rgba(0,180,255,' + (alpha * 0.25 + mf * 0.15) + ')');
                g.addColorStop(0.5, 'rgba(0,120,210,' + (alpha * 0.06 + mf * 0.06) + ')');
                g.addColorStop(1, 'rgba(0,60,180,0)');
                ctx.beginPath(); ctx.arc(p.x, p.y, gr, 0, Math.PI*2);
                ctx.fillStyle = g; ctx.fill();

                // 核心（柔光）
                var cc = mf > 0.2
                    ? 'rgba(180,235,255,' + Math.min(0.9, alpha * 1.3) + ')'
                    : 'rgba(100,190,240,' + alpha + ')';
                ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2);
                ctx.fillStyle = cc; ctx.fill();
            }

            function drawLine(a, b, mf) {
                var dx = b.x - a.x, dy = b.y - a.y;
                var d = Math.sqrt(dx*dx + dy*dy);
                if (d > CONNECT_DIST) return;
                var alpha = 0.04 * (1 - d/CONNECT_DIST) + mf * 0.12;
                if (alpha < 0.01) return;
                var lw = 0.4 + mf * 0.8;
                ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
                ctx.strokeStyle = 'rgba(0,150,240,' + alpha + ')';
                ctx.lineWidth = lw; ctx.stroke();
            }

            function frame() {
                ctx.clearRect(0, 0, w, h);

                mouse.x += (mouse.tx - mouse.x) * 0.12;
                mouse.y += (mouse.ty - mouse.y) * 0.12;
                var on = mouse.tx > 0;

                // 粒子漂移
                for (var i = 0; i < pts.length; i++) {
                    var p = pts[i];
                    p.x += p.vx; p.y += p.vy;

                    // 极微弱吸引
                    if (on) {
                        var dx = mouse.x - p.x, dy = mouse.y - p.y;
                        var d = Math.sqrt(dx*dx + dy*dy);
                        if (d < MOUSE_RANGE && d > 0) {
                            var f = (1 - d/MOUSE_RANGE) * 0.008;
                            p.vx += (dx/d) * f;
                            p.vy += (dy/d) * f;
                        }
                    }

                    p.vx *= 0.9995; p.vy *= 0.9995;
                    var sp = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
                    if (sp > 0.35) { p.vx *= 0.35/sp; p.vy *= 0.35/sp; }
                    if (sp < 0.06) { p.vx += rn(-0.02,0.02); p.vy += rn(-0.02,0.02); }

                    if (p.x < -30) p.x = w+30; if (p.x > w+30) p.x = -30;
                    if (p.y < -30) p.y = h+30; if (p.y > h+30) p.y = -30;
                }

                // 连线
                for (var i = 0; i < pts.length; i++)
                    for (var j = i+1; j < pts.length; j++) {
                        var a = pts[i], b = pts[j];
                        var da = Math.sqrt((a.x-mouse.x)*(a.x-mouse.x)+(a.y-mouse.y)*(a.y-mouse.y));
                        var db = Math.sqrt((b.x-mouse.x)*(b.x-mouse.x)+(b.y-mouse.y)*(b.y-mouse.y));
                        var mf = on ? Math.max(0, 1 - Math.min(da,db)/MOUSE_RANGE) : 0;
                        drawLine(a, b, mf);
                    }

                // 粒子
                for (var i = 0; i < pts.length; i++) drawP(pts[i]);

                // 鼠标光环
                if (on) {
                    var rg = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 70);
                    rg.addColorStop(0, 'rgba(0,160,240,0.10)');
                    rg.addColorStop(0.5, 'rgba(0,130,220,0.04)');
                    rg.addColorStop(1, 'rgba(0,60,180,0)');
                    ctx.beginPath(); ctx.arc(mouse.x, mouse.y, 70, 0, Math.PI*2);
                    ctx.fillStyle = rg; ctx.fill();

                    ctx.beginPath(); ctx.arc(mouse.x, mouse.y, 50, 0, Math.PI*2);
                    ctx.strokeStyle = 'rgba(0,160,240,0.20)'; ctx.lineWidth = 1; ctx.stroke();
                }

                requestAnimationFrame(frame);
            }

            window.addEventListener('resize', function() { rs(); init(); });
            rs(); init(); frame();
        })();
    </script>

    <!-- ===== 登录表单逻辑 ===== -->
    <script>
        (function() {
            var form = document.getElementById('loginForm');
            var btn  = document.getElementById('loginBtn');
            var ue   = document.getElementById('username');
            var pe   = document.getElementById('password');
            var uer  = document.getElementById('usernameError');
            var per  = document.getElementById('passwordError');

            function clr() {
                uer.textContent = ''; per.textContent = '';
                ue.classList.remove('error'); pe.classList.remove('error');
            }
            function load(on) {
                if (on) { btn.classList.add('loading'); btn.disabled = true; }
                else    { btn.classList.remove('loading'); btn.disabled = false; }
            }

            form.addEventListener('submit', function(e) {
                e.preventDefault(); clr();
                var u = ue.value.trim(), p = pe.value.trim(), ok = true;
                if (!u) { uer.textContent = '请输入账号'; ue.classList.add('error'); ok = false; }
                if (!p) { per.textContent = '请输入密码'; pe.classList.add('error'); ok = false; }
                if (!ok) return;
                load(true);
                setTimeout(function() {
                    console.log('登录 → 账号:', u, '密码:', p);
                    load(false);
                    per.textContent = '登录成功，正在跳转...';
                    setTimeout(function() { window.location.href = 'monitoring.html'; }, 800);
                }, 1200);
            });

            ue.addEventListener('keydown', function(e) { if (e.key==='Enter') { e.preventDefault(); pe.focus(); } });
            pe.addEventListener('keydown', function(e) { if (e.key==='Enter') { e.preventDefault(); form.dispatchEvent(new Event('submit')); } });
            ue.addEventListener('input', function() { ue.classList.remove('error'); uer.textContent = ''; });
            pe.addEventListener('input', function() { pe.classList.remove('error'); per.textContent = ''; });

            // 导航栏时钟
            function tick() {
                var t = new Date();
                var el = document.getElementById('navTime');
                if (el) el.textContent = t.toLocaleString('zh-CN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
            }
            tick(); setInterval(tick, 1000);
        })();
    </script>

</body>
</html>
