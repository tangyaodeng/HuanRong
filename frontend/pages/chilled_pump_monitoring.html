<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷冻泵实时监控 - 智慧暖通AI预测系统</title>

    <!-- 样式 -->
    <link rel="stylesheet" href="/frontend/css/style.css">
    <link rel="stylesheet" href="/frontend/css/dashboard.css">
    <link rel="stylesheet" href="/frontend/css/components.css">
    <link rel="stylesheet" href="/frontend/css/all.min.css">
    <!-- ECharts -->
    <script src="/frontend/js/echarts.min.js"></script>

    <style>
       /* 监控网格布局 - 2x2，带居中控制 */
.monitoring-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(500px, 800px)); /* 最小500px，最大800px */
    gap: 20px;
    margin-top: 20px;
    justify-content: center; /* 关键：水平居中 */
    align-items: start; /* 垂直顶部对齐 */
}

.chart-container {
    background: white;
    border-radius: 8px;
    padding: 20px;
    border: 1px solid #e9ecef;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    height: 450px; /* 增加高度 */
    width: 100%; /* 使用100%宽度填充网格单元格 */
    max-width: 800px; /* 最大宽度限制 */
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden; /* 防止内容溢出 */
}

/* 确保图表本身响应式 */
.chart-wrapper {
    flex: 1;
    width: 100%;
    min-height: 250px; /* 增加最小高度 */
}

/* 响应式设计 */
@media (max-width: 1700px) {
    .monitoring-grid {
        grid-template-columns: repeat(2, minmax(450px, 1fr)); /* 在中等屏幕上更灵活 */
    }
}

@media (max-width: 1200px) {
    .monitoring-grid {
        grid-template-columns: minmax(300px, 800px); /* 单列，居中 */
        justify-items: center; /* 每个项目在网格单元格内居中 */
    }

    .chart-container {
        width: 100%;
        max-width: 800px;
    }
}

@media (max-width: 768px) {
    .chart-container {
        height: 400px; /* 在小屏幕上调整高度 */
        padding: 15px;
    }
}

.chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 1px solid #e9ecef;
    flex-shrink: 0;
}

.chart-title {
    font-weight: 600;
    color: #2c3e50;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.1em;
}

/* 修改时间控件容器样式 */
.custom-time-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: nowrap;
}

.custom-time-controls input[type="datetime-local"] {
    padding: 6px 10px;
    border: 1px solid #dee2e6;
    border-radius: 4px;
    font-size: 0.9em;
    min-width: 160px;
}

.custom-time-controls .btn {
    padding: 6px 12px;
    font-size: 0.9em;
    white-space: nowrap;
}

/* 移除不需要的样式 */
.time-presets-wrapper,
.time-range-controls,
.time-presets,
.btn-time-preset,
.time-preset-select {
    display: none;
}

.real-time-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #28a745;
    font-weight: 500;
    font-size: 0.9em;
    margin-right: 15px;
}

.real-time-indicator .pulse {
    width: 8px;
    height: 8px;
    background-color: #28a745;
    border-radius: 50%;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7);
    }
    70% {
        transform: scale(1);
        box-shadow: 0 0 0 10px rgba(40, 167, 69, 0);
    }
    100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(40, 167, 69, 0);
    }
}

.chart-wrapper {
    flex: 1;
    width: 100%;
    min-height: 250px;
}

.loading-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(255, 255, 255, 0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

.loader {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #3498db;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.page-stats {
    display: flex;
    gap: 20px;
    margin: 20px 0;
    padding: 15px;
    background: #f8f9fa;
    border-radius: 8px;
    flex-wrap: wrap;
}

.stat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 15px;
    background: white;
    border-radius: 4px;
    border: 1px solid #e9ecef;
}

.stat-label {
    font-weight: 500;
    color: #6c757d;
}

.stat-value {
    font-weight: 600;
    color: #495057;
}

.empty-chart {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    color: #6c757d;
}

.empty-chart i {
    font-size: 3em;
    margin-bottom: 10px;
    color: #dee2e6;
}
    </style>
</head>
<body>
    <!-- 导航栏容器 -->
    <div id="navbar-container"></div>

    <!-- 主要内容区 -->
    <main class="main-content">
        <div class="page-header">
            <h1><i class="fas fa-chart-line"></i> 实时监控 - 多设备预测数据</h1>
            <div class="page-actions">
                <button class="btn btn-secondary" id="refresh-all-btn">
                    <i class="fas fa-sync-alt"></i> 刷新全部
                </button>
            </div>
        </div>

        <!-- 页面统计信息 -->
        <div class="page-stats">
            <div class="stat-item">
                <span class="stat-label">总设备数:</span>
                <span class="stat-value" id="total-devices">4</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">运行中设备:</span>
                <span class="stat-value" id="active-devices">2</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">平均预测精度:</span>
                <span class="stat-value" id="avg-accuracy">82.45%</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">最后更新时间:</span>
                <span class="stat-value" id="global-update-time">--:--:--</span>
            </div>
        </div>

        <!-- 监控图表 - 2x2网格 -->
        <div class="monitoring-grid" id="monitoring-grid">
            <!-- 图表1: PLC AI183 -->
            <div class="chart-container" id="chart-container-1">
                <div class="chart-header">
                    <h3 class="chart-title">
                        <i class="fas fa-bolt"></i>
                        PLC AI183 - 1#冷冻泵功率预测
                    </h3>
                    <div class="custom-time-controls">
                        <div class="real-time-indicator">
                            <div class="pulse"></div>
                            <span>实时数据</span>
                        </div>
                        <input type="datetime-local" class="start-time" data-chart="1">
                        <span>至</span>
                        <input type="datetime-local" class="end-time" data-chart="1">
                        <button class="btn btn-secondary apply-time-btn" data-chart="1">
                            <i class="fas fa-check"></i> 应用
                        </button>
                        <button class="btn btn-outline-secondary reset-time-btn" data-chart="1" title="重置为最近24小时">
                            <i class="fas fa-undo"></i>
                        </button>
                        <button class="btn-action fullscreen-btn" data-chart="1" title="全屏查看">
                            <i class="fas fa-expand"></i>
                        </button>
                    </div>
                </div>

                <div class="loading-overlay" id="chart-loading-1" style="display: none;">
                    <div class="loader"></div>
                    <span style="margin-left: 10px;">加载数据中...</span>
                </div>
                <div class="chart-wrapper" id="real-time-chart-1"></div>
            </div>

           <!-- 图表2: PLC AI191 -->
            <div class="chart-container" id="chart-container-2">
                <div class="chart-header">
                    <h3 class="chart-title">
                        <i class="fas fa-bolt"></i>
                        PLC AI191 - 2#冷冻泵功率预测
                    </h3>
                    <div class="custom-time-controls">
                        <div class="real-time-indicator">
                            <div class="pulse"></div>
                            <span>实时数据</span>
                        </div>
                        <input type="datetime-local" class="start-time" data-chart="2">
                        <span>至</span>
                        <input type="datetime-local" class="end-time" data-chart="2">
                        <button class="btn btn-secondary apply-time-btn" data-chart="2">
                            <i class="fas fa-check"></i> 应用
                        </button>
                        <button class="btn btn-outline-secondary reset-time-btn" data-chart="2" title="重置为最近24小时">
                            <i class="fas fa-undo"></i>
                        </button>
                        <button class="btn-action fullscreen-btn" data-chart="2" title="全屏查看">
                            <i class="fas fa-expand"></i>
                        </button>
                    </div>
                </div>

                <div class="loading-overlay" id="chart-loading-2" style="display: none;">
                    <div class="loader"></div>
                    <span style="margin-left: 10px;">加载数据中...</span>
                </div>
                <div class="chart-wrapper" id="real-time-chart-2"></div>
            </div>

            <!-- 图表3: 预留 -->
            <div class="chart-container" id="chart-container-3">
                <div class="chart-header">
                    <h3 class="chart-title">
                        <i class="fas fa-chart-bar"></i>
                        预留监控2
                    </h3>
                </div>
                <div class="empty-chart">
                    <i class="fas fa-chart-line"></i>
                    <p>图表待配置</p>
                </div>
            </div>

            <!-- 图表4: 预留 -->
            <div class="chart-container" id="chart-container-4">
                <div class="chart-header">
                    <h3 class="chart-title">
                        <i class="fas fa-chart-bar"></i>
                        预留监控2
                    </h3>
                </div>
                <div class="empty-chart">
                    <i class="fas fa-chart-line"></i>
                    <p>图表待配置</p>
                </div>
            </div>
        </div>

        <!-- 全局警告信息 -->
        <div id="data-warning" style="display: none; background-color: #fff3cd; color: #856404; padding: 10px; margin-top: 20px; border: 1px solid #ffeaa7; border-radius: 4px;"></div>
        <div id="debug-info" style="font-size: 12px; color: #666; margin-top: 5px;"></div>
    </main>

    <!-- JavaScript -->
    <script src="/frontend/js/utils.js"></script>
    <script src="/frontend/js/pages/chilled_pump_monitoring-api.js"></script>
    <script src="/frontend/js/pages/chilled_pump_monitoring.js"></script>
    <script src="/frontend/js/components/navbar.js"></script>
</body>
</html>
