version: '3.8'                     # Docker Compose 文件版本，3.8 适用于 Docker Engine 19.03+

services:
  # ========== 主 FastAPI 应用 ==========
  web:
    image: fastapi-app:latest       # 使用你已构建的镜像（包含所有依赖）
    container_name: fastapi-web      # 固定容器名称，方便管理
    ports:
      - "8000:8000"                 # 宿主机 8000 端口 → 容器 8000 端口（FastAPI 默认端口）
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/mydb   # 数据库连接串，请根据实际修改
    volumes:
      - ./backend:/app/backend       # 挂载宿主机代码目录到容器，实现代码热更新（修改代码后容器内立即生效）
    command: python start.py          # 覆盖 Dockerfile 中的 CMD，显式启动主应用
    networks:
      - app-network                  # 加入自定义网络，以便通过服务名互相通信
    restart: unless-stopped           # 容器意外退出时自动重启，除非手动停止

  # ========== 数据处理器（长期运行） ==========
  data-processor:
    image: fastapi-app:latest
    container_name: fastapi-data-processor
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/mydb
    volumes:
      - ./backend:/app/backend        # 同样挂载代码，便于更新
    working_dir: /app/backend/ml/data # 进入脚本所在目录
    command: python composite_feature_processor.py --mode sync   # 运行数据处理器（--mode sync 示例参数）
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - web                           # 可选：在 web 启动后再启动本服务（但不等服务就绪）

  # ========== 冷却模型（长期运行） ==========
  cooling-model:
    image: fastapi-app:latest
    container_name: fastapi-cooling-model
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/mydb
    volumes:
      - ./backend:/app/backend
    working_dir: /app/backend/ml/models
    command: python cooling_opt_model.py
    networks:
      - app-network
    restart: unless-stopped

  # ========== 冷冻模型（长期运行） ==========
  chilled-model:
    image: fastapi-app:latest
    container_name: fastapi-chilled-model
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/mydb
    volumes:
      - ./backend:/app/backend
    working_dir: /app/backend/ml/models
    command: python chilled_opt_model.py
    networks:
      - app-network
    restart: unless-stopped

  # ========== PostgreSQL 数据库服务（可选） ==========
  db:
    image: postgres:18.1               # 使用官方 PostgreSQL 18.1 镜像
    container_name: postgres-db
    environment:
      POSTGRES_USER: user               # 数据库用户名，请修改
      POSTGRES_PASSWORD: pass           # 数据库密码，请修改
      POSTGRES_DB: mydb                  # 默认数据库名，请修改
    volumes:
      - postgres_data:/var/lib/postgresql   # 数据持久化卷，避免容器删除后数据丢失
    networks:
      - app-network
    restart: unless-stopped

# ========== 定义持久化卷 ==========
volumes:
  postgres_data:                        # 声明一个名为 postgres_data 的卷，用于数据库数据

# ========== 定义自定义网络 ==========
networks:
  app-network:
    driver: bridge                       # 使用 bridge 驱动，容器间可通过服务名通信